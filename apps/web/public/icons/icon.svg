<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <g transform="translate(96,96)">
    <!-- Car body -->
    <rect x="-50" y="-15" width="100" height="35" rx="8" fill="url(#accent)"/>
    <rect x="-35" y="-30" width="70" height="20" rx="6" fill="url(#accent)" opacity="0.8"/>
    <!-- Windows -->
    <rect x="-28" y="-25" width="24" height="12" rx="3" fill="#0f172a" opacity="0.6"/>
    <rect x="4" y="-25" width="24" height="12" rx="3" fill="#0f172a" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="-30" cy="22" r="10" fill="#334155"/>
    <circle cx="-30" cy="22" r="5" fill="#64748b"/>
    <circle cx="30" cy="22" r="10" fill="#334155"/>
    <circle cx="30" cy="22" r="5" fill="#64748b"/>
    <!-- Location pin -->
    <circle cx="55" cy="-35" r="12" fill="#ef4444" opacity="0.9"/>
    <circle cx="55" cy="-35" r="5" fill="white"/>
    <polygon points="55,-20 50,-25 60,-25" fill="#ef4444" opacity="0.9"/>
  </g>
</svg>
